<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel='stylesheet' href='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/css/bootstrap.css'
        integrity='sha512-zylce7fP6h4usg536JBTRj2rt7q22Z0qicHSlgSK53Irtfkz37ate3KCQ59du+aXZV6R3yyL2X1LyGKBEUMZaw=='
        crossorigin='anonymous' />
    <link rel="stylesheet" href="./index.css">
    <title>Products-Cart-system</title>
</head>

<body>
    <section id="home" class="d-flex col-12" style="height: 100dvh">
        <div class="products col-8 h-100 p-4 overflow-auto">
            <div id="productsDiv" class="row g-4"></div>
        </div>
        <div class="cart col-4 h-100 overflow-auto">
            <div class="overlay p-4 col-12 h-100">
                <h1 class="mb-3">Your Cart</h1>
                <table class="table table-dark table-bordered align-middle">
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>Item Name</th>
                            <th>Item Price</th>
                            <th>Item Qty</th>
                            <th>Total</th>
                        </tr>
                    </thead>
                    <tbody id="cartProductsBody"></tbody>
                    <tfoot>
                        <tr>
                            <td colspan="2">Total</td>
                            <td colspan="3">$ <span id="totalProductsPrice">0</span></td>
                        </tr>
                    </tfoot>
                </table>
            </div>
        </div>
    </section>

    <script src='https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.8/js/bootstrap.js'
        integrity='sha512-GKxQGmCBqm3YHCZTdqD3Bvsz+AHRObqztq6xDo+68527RxgVw7wF1TR5ZSBvtWiz5qzpOzUGGvxJbT/6UzzSOQ=='
        crossorigin='anonymous'></script>
    <script src=" ./index.js">
    </script>
</body>

</html>
