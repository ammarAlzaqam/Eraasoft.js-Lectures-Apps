<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--! Bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--! Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="shortcut icon" href="../icon.png" type="image/png">
    <link rel="stylesheet" href="./app.css">
    <title>E-Walt-App</title>
</head>

<body>
    <header class="py-3">
        <div class="container d-flex justify-content-between align-items-center">
            <div class="left d-flex align-items-center gap-3">
                <img id="avatarImg" alt="avatar-img">
                <div class="">
                    <h3 id="name" class="fs-5"></h3>
                    <p id="username"></p>
                </div>
            </div>
            <div class="right d-flex align-items-center gap-2" onclick="logout()">
                <span>Logout</span>
                <i class="fa-solid fa-arrow-right-from-bracket"></i>
            </div>
        </div>
    </header>

    <section id="wallet-control-panel">
        <div class="container">
            <div
                class="app-control-wrapper d-flex flex-column gap-3 border shadow rounded p-4 col-12 col-md-6 col-xl-5 col-xxl-4 mx-auto my-5">
                <h3 class="d-flex align-items-center gap-3">Your Balance: <span id="balance">****</span>
                    <div class="eye-icon-wrapper">
                        <i class="fa-solid fa-eye" id="showBalanceIcon" data-bs-toggle="modal"
                            data-bs-target="#showBalanceModal"></i>
                        <i class="fa-solid fa-eye-slash opacity-0" id="hiddenBalanceIcon" onclick="hiddenBalance()"></i>
                    </div>
                </h3>
                <input id="amountInput" type="number" class="form-control" placeholder="Enter your amount">
                <div class="btns d-flex gap-2">
                    <button class="btn btn-success" onclick="depositAmount()">Deposit</button>
                    <button class="btn btn-danger" onclick="withDrawAmount()">Withdraw</button>
                </div>
            </div>
        </div>
    </section>

    <!-- Modal for shaw balance -->
    <div class="modal fade" id="showBalanceModal" tabindex="-1" aria-labelledby="showBalanceModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Show balance</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input id="passwordInput" type="password" class="form-control" placeholder="Enter your password">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="showBalance()">Show
                        Balance</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for check password before deposit -->
    <div class="modal fade" id="checkPasswordForDepositModal" tabindex="-1" aria-labelledby="checkPasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">Deposit amount</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input id="passwordInputToDeposit" type="password" class="form-control"
                        placeholder="Enter your password">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="DepositAfterCheck()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Modal for check password before deposit -->
    <div class="modal fade" id="checkPasswordForWithDrawModal" tabindex="-1" aria-labelledby="checkPasswordModalLabel"
        aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h1 class="modal-title fs-5" id="exampleModalLabel">WidthDraw amount</h1>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <input id="passwordInputToWidthDraw" type="password" class="form-control"
                        placeholder="Enter your password">
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                    <button type="button" class="btn btn-primary" onclick="withDrawAfterCheck()">Confirm</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./app.js"></script>
</body>

</html>
