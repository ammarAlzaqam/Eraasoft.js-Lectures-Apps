<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--! Bootstrap cdn -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <!--! Font awesome cdn -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="shortcut icon" href="./icon.png" type="image/png">
    <link rel="stylesheet" href="./index.css">
    <title>E-walt-login</title>
</head>

<body>
    <section id="login">
        <div class="container">
            <div class="register-box border shadow rounded p-4 pt-5 col-12 col-md-6 col-xl-5 col-xxl-4 mx-auto my-5">
                <img src="./icon.png" alt="logo-img">
                <h1 class="fs-1 text-center mb-4">E-walt App</h1>
                <form id="loginForm" class="d-flex flex-column gap-3">
                    <input id="nameInput" class="form-control" type="text" placeholder="Enter you name" required>
                    <input id="usernameInput" class="form-control" type="text" placeholder="Choose a username" required>
                    <div class="password-field">
                        <div class="eye-icon-wrapper opacity-0" onclick="togglePassword()">
                            <i class="fa-solid fa-eye" id="showPasswordIcon"></i>
                            <i class="fa-solid fa-eye-slash opacity-0" id="hiddenPasswordIcon"></i>
                        </div>
                        <input id="passwordInput" class="form-control" type="password" name="password"
                            placeholder="Enter your password" required>
                    </div>
                    <div class="upload-img d-flex align-items-center justify-content-between">
                        <label for="avatar" class="custom-file">
                            Select Your Image
                        </label>
                        <input id="avatar" class="d-none" type="file" name="avatar" accept="image/*">
                        <label for="avatar">
                            <img id="preview" class="rounded-circle shadow border">
                        </label>
                    </div>
                    <button class="btn btn-success">Log in</button>
                </form>
            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./index.js"></script>
</body>

</html>
